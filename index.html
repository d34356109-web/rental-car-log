<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛訂單管理系統</title>
    
    <!-- Tailwind CSS (樣式庫) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 解決 React 在瀏覽器直接運行的相依性問題 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    
    <!-- Babel (讓瀏覽器看懂 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        /* 隱藏未載入時的閃爍 */
        #root:empty { display: none; }
        .transition-max-height { transition: max-height 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 主程式邏輯 -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar, Car, Users, CreditCard, Snowflake, Sun,
            Plus, Search, Edit3, Trash2, Clock, Save, X, 
            LogOut, ShieldCheck, Database, CheckCircle, ArrowRight, AlertCircle,
            ChevronDown, ChevronUp, BellRing, AlertTriangle, MapPin, RotateCcw,
            History
        } from 'lucide-react';

        // --- Firebase SDK ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, 
            serverTimestamp 
        } from 'firebase/firestore';

        // 🔴 請在這裡填入您的 Firebase 設定 (保留引號) 🔴
        const firebaseConfig = {
            apiKey: "AIzaSyDq65URVL5sppv-2yXBh8DQuEwaXm5u5k0",
            authDomain: "myrentalcarsystem-a88fb.firebaseapp.com",
            projectId: "myrentalcarsystem-a88fb",
            storageBucket: "myrentalcarsystem-a88fb.firebasestorage.app",
            messagingSenderId: "1076727464488",
            appId: "1:1076727464488:web:9599c788414f5211896b1d"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 預設資料 ---
        const INITIAL_VEHICLES_SEED = [
            { location: '成田', plate: '成田330わ888', brand: 'Toyota', model: 'Vellfire', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4861 3901 001', tire: '冬済' },
            { location: '成田', plate: '和泉330わ2222', brand: 'Toyota', model: 'Alphard', feature: '', seats: 8, etc: '8001 6161 4860 7900 000', tire: '冬済' },
            { location: '成田', plate: 'なにわ334わ8888', brand: 'Toyota', model: 'Alphard', feature: '40系 Captain', seats: 7, etc: '7804 2150 2134 9280', tire: '冬済' },
            { location: '成田', plate: 'なにわ335わ8888', brand: 'Toyota', model: 'Alphard', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4860 6901 000', tire: '冬済' },
            { location: '成田', plate: '品川302わ2282', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8026 8702 5853 4820 000', tire: '冬済' },
            { location: '成田', plate: '柏300わ2258', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8001 6161 4861 4901 000', tire: '冬済' },
            { location: '成田', plate: '柏300わ2588', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8001 6161 4860 9901 007', tire: '冬済' },
            { location: '成田', plate: '柏300わ2599', brand: 'Toyota', model: 'Alphard', feature: '4WD', seats: 7, etc: '8001 6161 4860 0901 006', tire: '冬済' },
            { location: '成田', plate: 'なにわ342わ88', brand: 'Toyota', model: 'Vellfire', feature: '', seats: 7, etc: '', tire: '冬済' },
            { location: '成田', plate: '品川302わ4724', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '', tire: '冬済' },
        ];

        // 常用地點選項
        const PRESET_LOCATIONS = ["成田二航", "成田一航", "羽田"];

        // --- 日本時間處理工具 ---
        // 取得目前的「日本標準時間」Date 物件
        const getJSTNominalDate = () => {
            return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
        };
        
        // 將 Date 物件轉為 datetime-local 支援的 YYYY-MM-DDTHH:mm 格式
        const getJSTString = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const h = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d}T${h}:${min}`;
        };

        // --- React Component ---
        function VehicleOrderSystem() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            
            // 即時時間狀態
            const [realTime, setRealTime] = useState(new Date());

            // 自訂彈出視窗狀態
            const [dialog, setDialog] = useState({ isOpen: false, message: '', type: 'alert', onConfirm: null });

            // UI State for Expanded Cards
            const [expandedCards, setExpandedCards] = useState({});

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [editingOrder, setEditingOrder] = useState(null);
            const [isVehicleModalOpen, setIsVehicleModalOpen] = useState(false);
            const [editingVehicle, setEditingVehicle] = useState(null);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [historySearchTerm, setHistorySearchTerm] = useState('');
            
            // 將過濾日期預設為日本當下時間
            const [filterDateTime, setFilterDateTime] = useState(() => getJSTString(getJSTNominalDate()));

            const [orderFormData, setOrderFormData] = useState({
                customer: '', start: '', end: '', vehicleId: '', note: '', status: 'confirmed',
                pickupLocation: '', returnLocation: ''
            });
            const [vehicleFormData, setVehicleFormData] = useState({
                location: '成田', plate: '', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '', tire: '冬済'
            });
            const [newEtcNumber, setNewEtcNumber] = useState('');

            // 工具：顯示對話框
            const showAlert = (message) => setDialog({ isOpen: true, message, type: 'alert', onConfirm: null });
            const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, message, type: 'confirm', onConfirm });

            // 時鐘計時器
            useEffect(() => {
                const timer = setInterval(() => {
                    setRealTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Auth & Sync
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const unsubVehicles = onSnapshot(collection(db, 'vehicles'), (snap) => {
                            setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setIsLoading(false);
                        });
                        const unsubOrders = onSnapshot(collection(db, 'orders'), (snap) => {
                            setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                        return () => { unsubVehicles(); unsubOrders(); };
                    } else {
                        setIsLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Toggle Expand
            const toggleExpand = (id) => {
                setExpandedCards(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            // Helpers
            const formatDateTime = (iso) => {
                if (!iso) return '';
                const d = new Date(iso);
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            };
            
            const formatTimeOnly = (iso) => {
                if (!iso) return '';
                const d = new Date(iso);
                return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            };

            // 用於排休建議的格式化 (包含週幾)
            const formatDateOnly = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} (週${days[d.getDay()]})`;
            };
            
            const formatShortDateWithDay = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}(週${days[d.getDay()]})`;
            };

            // 用於看板頂部「可空閒至何時」的短格式時間
            const formatTimeUntil = (iso, targetTimeISO) => {
                if (!iso) return '無排程';
                const d = new Date(iso);
                const t = new Date(targetTimeISO);
                const isSameDay = d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
                const hm = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                if (isSameDay) {
                    return `本日 ${hm}`;
                } else {
                    return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${hm}`;
                }
            };

            // 格式化上方顯示的日本即時時間
            const liveTimeDisplay = useMemo(() => {
                const timeStr = realTime.toLocaleString('zh-TW', {
                    timeZone: 'Asia/Tokyo',
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false
                });
                return `${timeStr} (日本時間)`;
            }, [realTime]);

            const getDayOrders = (vid, dateTimeStr) => {
                const selectedDate = new Date(dateTimeStr);
                const startOfDay = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate(), 0, 0, 0);
                const endOfDay = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate(), 23, 59, 59);
                return orders
                    .filter(o => o.vehicleId === vid && o.status !== 'cancelled' && new Date(o.start) < endOfDay && new Date(o.end) > startOfDay)
                    .sort((a, b) => new Date(a.start) - new Date(b.start));
            };

            const getVehicleSchedule = (vid, dateTimeStr) => {
                const selectedDate = new Date(dateTimeStr);
                const startOfDay = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate(), 0, 0, 0);
                return orders
                    .filter(o => o.vehicleId === vid && o.status !== 'cancelled' && new Date(o.end) > startOfDay)
                    .sort((a, b) => new Date(a.start) - new Date(b.start));
            };

            const isVehicleAvailable = (vid, start, end, excludeId) => {
                const s = new Date(start);
                const e = new Date(end);
                return !orders.some(o => o.vehicleId === vid && o.id !== excludeId && o.status !== 'cancelled' && s < new Date(o.end) && e > new Date(o.start));
            };

            const isOrderActiveAtTime = (order, targetTimeStr) => {
                const targetTime = new Date(targetTimeStr);
                const start = new Date(order.start);
                const end = new Date(order.end);
                return targetTime >= start && targetTime <= end;
            };

            // Sorting Logic for Dashboard
            const sortedVehicles = useMemo(() => {
                const targetTime = new Date(filterDateTime);
                
                const vehiclesWithStatus = vehicles.map(v => {
                    const dayOrders = getDayOrders(v.id, filterDateTime);
                    const activeOrder = dayOrders.find(o => isOrderActiveAtTime(o, filterDateTime));
                    const futureOrders = dayOrders.filter(o => !isOrderActiveAtTime(o, filterDateTime) && new Date(o.start) > targetTime);
                    
                    // 找出該車輛未來「最接近的一筆」訂單，不限於當日
                    const absoluteNextOrder = orders
                        .filter(o => o.vehicleId === v.id && o.status !== 'cancelled' && new Date(o.start) > targetTime)
                        .sort((a, b) => new Date(a.start) - new Date(b.start))[0];
                    
                    let sortWeight = 999; 
                    let sortTime = 0; 

                    if (activeOrder) {
                        // 第一優先：正在出租 (看誰先還車)
                        sortWeight = 1;
                        sortTime = new Date(activeOrder.end).getTime();
                    } else if (absoluteNextOrder) {
                        // 第二優先：空閒中，但有未來預約 (看誰先交車)
                        sortWeight = 2;
                        sortTime = new Date(absoluteNextOrder.start).getTime();
                    } else {
                        // 第三：完全空車 (無任何後續排程)
                        sortWeight = 3;
                    }

                    return { ...v, dayOrders, activeOrder, futureOrders, absoluteNextOrder, sortWeight, sortTime };
                });

                return vehiclesWithStatus.sort((a, b) => {
                    if (a.sortWeight !== b.sortWeight) return a.sortWeight - b.sortWeight;
                    return a.sortTime - b.sortTime;
                });
            }, [vehicles, orders, filterDateTime]);

            // 計算選定時間點的真正空車 (在指定時間未出租即為空閒)
            const availableVehicles = useMemo(() => {
                return sortedVehicles.filter(v => !v.activeOrder);
            }, [sortedVehicles]);

            // 人員可排休日 (該日無任何交車或還車動作)
            const freeDaysData = useMemo(() => {
                const targetDate = new Date(filterDateTime);
                const startOfTargetDay = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate(), 0, 0, 0);
                
                const validOrders = orders.filter(o => o.status !== 'cancelled');
                
                // 尋找最後一個需要交車或還車的日子
                let maxDate = startOfTargetDay;
                let hasFutureEvents = false;

                validOrders.forEach(o => {
                    const oStart = new Date(o.start);
                    const oEnd = new Date(o.end);
                    if (oStart > maxDate) { maxDate = oStart; hasFutureEvents = true; }
                    if (oEnd > maxDate) { maxDate = oEnd; hasFutureEvents = true; }
                });

                const freeDatesList = [];
                // 若沒有未來訂單，直接回傳空狀態
                if (!hasFutureEvents) {
                    return { list: [], maxDate: maxDate, hasFutureEvents: false };
                }

                // 取 maxDate 的當天結束
                const endOfMaxDay = new Date(maxDate.getFullYear(), maxDate.getMonth(), maxDate.getDate(), 23, 59, 59);
                let currentDate = new Date(startOfTargetDay);
                
                // 逐日檢查到最後一筆交/還車的日子
                while (currentDate <= endOfMaxDay) {
                    const dayStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 0, 0, 0);
                    const dayEnd = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 23, 59, 59);
                    
                    // 判斷這一天是否有「交車」或「還車」動作
                    const hasEventOnThisDay = validOrders.some(o => {
                        const oStart = new Date(o.start);
                        const oEnd = new Date(o.end);
                        const isPickupToday = oStart >= dayStart && oStart <= dayEnd;
                        const isReturnToday = oEnd >= dayStart && oEnd <= dayEnd;
                        return isPickupToday || isReturnToday;
                    });
                    
                    // 只要當天不用交車也不用還車，就可以放假
                    if (!hasEventOnThisDay) {
                        freeDatesList.push(new Date(dayStart));
                    }
                    
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                // 將連續日期群組化 (例如：2/24 ~ 2/26)
                const grouped = [];
                if (freeDatesList.length > 0) {
                    let currentGroup = [freeDatesList[0]];
                    for (let i = 1; i < freeDatesList.length; i++) {
                        const prev = freeDatesList[i-1];
                        const curr = freeDatesList[i];
                        const diffTime = Math.abs(curr - prev);
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24)); 
                        
                        if (diffDays === 1) {
                            currentGroup.push(curr);
                        } else {
                            grouped.push(currentGroup);
                            currentGroup = [curr];
                        }
                    }
                    grouped.push(currentGroup);
                }
                
                return { list: grouped, maxDate: endOfMaxDay, hasFutureEvents: true };
            }, [orders, filterDateTime]);

            // 14日內行程提醒邏輯 (以精確的日本時間為起點過濾)
            const weeklyReminders = useMemo(() => {
                const targetJstDate = getJSTNominalDate(); // 現實的日本時間 (用於過濾已過去的訂單)
                const startWindow = new Date(`${filterDateTime.split('T')[0]}T00:00:00`); 
                const endWindow = new Date(startWindow);
                endWindow.setDate(endWindow.getDate() + 14); // 改為 14 天

                const events = [];
                orders.forEach(o => {
                    if (o.status === 'cancelled') return;
                    
                    const startDate = new Date(o.start);
                    const endDate = new Date(o.end);
                    const vehicle = vehicles.find(v => v.id === o.vehicleId);
                    
                    if (!vehicle) return;

                    // 檢查交車 (Pickup) - 需在搜尋區間內 且 晚於日本當下時間
                    if (startDate >= startWindow && startDate <= endWindow && startDate > targetJstDate) {
                        events.push({
                            id: `start-${o.id}`,
                            type: 'pickup',
                            time: startDate,
                            order: o,
                            vehicle: vehicle
                        });
                    }

                    // 檢查還車 (Return) - 需在搜尋區間內 且 晚於日本當下時間
                    if (endDate >= startWindow && endDate <= endWindow && endDate > targetJstDate) {
                        events.push({
                            id: `end-${o.id}`,
                            type: 'return',
                            time: endDate,
                            order: o,
                            vehicle: vehicle
                        });
                    }
                });

                return events.sort((a, b) => a.time - b.time);
            }, [orders, vehicles, filterDateTime]);

            // 分離當前訂單與歷史訂單
            const { activeOrders, historyOrders } = useMemo(() => {
                const now = getJSTNominalDate();
                const active = [];
                const history = [];

                orders.forEach(o => {
                    if (o.status === 'cancelled') {
                        history.push(o);
                    } else if (new Date(o.end) < now) {
                        history.push(o); // 還車時間已過，視為歷史訂單
                    } else {
                        active.push(o); // 還沒結束的訂單
                    }
                });

                return { activeOrders: active, historyOrders: history };
            }, [orders, realTime]); // 依賴 realTime 讓狀態會隨時間自動切換


            // Actions
            const handleSaveOrder = async (e) => {
                e.preventDefault();
                if (!orderFormData.customer || !orderFormData.start || !orderFormData.end || !orderFormData.vehicleId) return showAlert("請填寫必填欄位");
                if (new Date(orderFormData.start) >= new Date(orderFormData.end)) return showAlert("時間錯誤");
                if (!isVehicleAvailable(orderFormData.vehicleId, orderFormData.start, orderFormData.end, editingOrder?.id)) return showAlert("該時段車輛已被預約");

                try {
                    const data = { ...orderFormData, updatedAt: serverTimestamp() };
                    if (editingOrder) await updateDoc(doc(db, 'orders', editingOrder.id), data);
                    else await addDoc(collection(db, 'orders'), { ...data, createdAt: serverTimestamp() });
                    setIsOrderModalOpen(false);
                } catch (err) { showAlert("儲存失敗: " + err.message); }
            };

            const handleDeleteOrder = (id) => {
                showConfirm("確定刪除?", async () => { 
                    await deleteDoc(doc(db, 'orders', id)); 
                });
            };

            const handleSaveVehicle = async (e) => {
                e.preventDefault();
                try {
                    const data = { ...vehicleFormData, updatedAt: serverTimestamp() };
                    if (editingVehicle) await updateDoc(doc(db, 'vehicles', editingVehicle.id), data);
                    else await addDoc(collection(db, 'vehicles'), { ...data, createdAt: serverTimestamp() });
                    setIsVehicleModalOpen(false);
                } catch (err) { showAlert("儲存失敗"); }
            };

            const handleDeleteVehicle = (id) => {
                showConfirm("確定刪除?", async () => { 
                    await deleteDoc(doc(db, 'vehicles', id)); 
                });
            };

            const handleSeedData = () => {
                showConfirm(`確定匯入預設車輛嗎？`, async () => {
                    try {
                        const existingPlates = vehicles.map(v => v.plate);
                        const newVehicles = INITIAL_VEHICLES_SEED.filter(v => !existingPlates.includes(v.plate));
                        if (newVehicles.length === 0) return showAlert("預設車輛已存在，無需匯入");
                        await Promise.all(newVehicles.map(v => addDoc(collection(db, 'vehicles'), { ...v, createdAt: serverTimestamp() })));
                        showAlert(`成功匯入 ${newVehicles.length} 台新車輛！`);
                    } catch (e) { showAlert("失敗: " + e.message); }
                });
            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center text-slate-500">載入資料中...</div>;

            return (
                <div className="pb-20 md:pb-0">
                    {/* 共用彈出視窗 */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl transform transition-all">
                                <h3 className="font-bold text-lg mb-3 text-slate-800 flex items-center gap-2">
                                    {dialog.type === 'confirm' ? <AlertTriangle className="text-yellow-500 w-5 h-5"/> : <AlertCircle className="text-blue-500 w-5 h-5"/>}
                                    {dialog.type === 'confirm' ? '請確認' : '系統提示'}
                                </h3>
                                <p className="text-slate-600 mb-6">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'confirm' && (
                                        <button onClick={() => setDialog({ isOpen: false, message: '', type: 'alert', onConfirm: null })} className="px-4 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 text-sm font-medium text-slate-700 transition-colors">取消</button>
                                    )}
                                    <button onClick={() => {

                                                        {isActiveNow ? '進行中' : '已預約'}
                                                    </span>
                                                </div>
                                                <div className="text-sm text-gray-800 mb-2 font-medium">
                                                    {v?.plate || '車輛已刪除'}
                                                </div>
                                                <div className="text-sm text-slate-700 mb-2 space-y-1">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-green-700 bg-green-100 font-bold text-[10px] px-1.5 py-0.5 rounded w-9 text-center">取車</span>
                                                        <span className="font-medium">{formatDateTime(o.start)}</span>
                                                        <span className="text-[10px] text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">@{o.pickupLocation}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-red-700 bg-red-100 font-bold text-[10px] px-1.5 py-0.5 rounded w-9 text-center">還車</span>
                                                        <span className="font-medium">{formatDateTime(o.end)}</span>
                                                        <span className="text-[10px] text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">@{o.returnLocation}</span>
                                                    </div>
                                                </div>
                                                {o.note && (
                                                    <div className="text-xs text-gray-600 mb-3 bg-yellow-50/50 p-2 rounded border border-yellow-100">
                                                        <span className="font-bold text-gray-700">備註：</span>{o.note}
                                                    </div>
                                                )}
                                                <div className="flex justify-end gap-3 border-t pt-2 mt-2">
                                                    <button onClick={()=>{setEditingOrder(o); setOrderFormData(o); setIsOrderModalOpen(true)}} className="text-sm text-blue-600 hover:bg-blue-50 px-3 py-1 rounded transition-colors">編輯</button>
                                                    <button onClick={()=>handleDeleteOrder(o.id)} className="text-sm text-red-600 hover:bg-red-50 px-3 py-1 rounded transition-colors">刪除</button>
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-white p-3 rounded shadow-sm border border-slate-100">
                                    <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                        <History size={18} className="text-gray-500" /> 歷史訂單紀錄
                                    </h2>
                                    <div className="relative w-full sm:w-64">
                                        <Search className="absolute left-2.5 top-2 w-4 h-4 text-slate-400" />
                                        <input 
                                            type="text" 
                                            placeholder="搜尋客戶或車牌..." 
                                            className="w-full pl-8 pr-3 py-1.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-gray-200 outline-none"
                                            value={historySearchTerm}
                                            onChange={e => setHistorySearchTerm(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="text-xs text-gray-500 px-2 flex items-center gap-1">
                                    <AlertCircle size={12} /> 系統自動將「還車時間早於當下」或「手動取消」的訂單歸檔於此
                                </div>

                                {historyOrders.length === 0 ? (
                                    <div className="text-center py-10 text-slate-400">尚無歷史訂單紀錄</div>
                                ) : (
                                    historyOrders
                                    .filter(o => {
                                        if (!historySearchTerm) return true;
                                        const v = vehicles.find(x=>x.id===o.vehicleId);
                                        const searchLower = historySearchTerm.toLowerCase();
                                        return o.customer.toLowerCase().includes(searchLower) || (v && v.plate.toLowerCase().includes(searchLower));
                                    })
                                    .sort((a,b)=>new Date(b.end)-new Date(a.end)) // 歷史訂單通常以結束時間越晚(越近期)的排越上面
                                    .map(o => {
                                        const v = vehicles.find(x=>x.id===o.vehicleId);
                                        return (
                                            <div key={o.id} className="bg-slate-50 p-4 rounded-xl border border-slate-200 opacity-80 hover:opacity-100 transition-opacity">
                                                <div className="flex justify-between mb-1">
                                                    <span className="font-bold text-slate-700">{o.customer}</span>
                                                    <span className="text-xs px-2 py-1 rounded font-bold bg-gray-200 text-gray-600">
                                                        {o.status === 'cancelled' ? '已取消' : '已結束'}
                                                    </span>
                                                </div>
                                                <div className="text-sm text-gray-600 mb-2 font-medium">
                                                    {v?.plate || '車輛已刪除'}
                                                </div>
                                                <div className="text-xs text-slate-500 mb-2 space-y-1">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-8 text-slate-400">取車:</span>
                                                        <span>{formatDateTime(o.start)}</span>
                                                        <span className="ml-auto">@{o.pickupLocation}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-8 text-slate-400">還車:</span>
                                                        <span>{formatDateTime(o.end)}</span>
                                                        <span className="ml-auto">@{o.returnLocation}</span>
                                                    </div>
                                                </div>
                                                {o.note && (
                                                    <div className="text-xs text-gray-500 mb-2 p-2 bg-white rounded border border-slate-200">
                                                        備註：{o.note}
                                                    </div>
                                                )}
                                                <div className="flex justify-end gap-3 border-t border-slate-200 pt-2 mt-2">
                                                    <button onClick={()=>{setEditingOrder(o); setOrderFormData(o); setIsOrderModalOpen(true)}} className="text-xs text-blue-600 hover:underline">檢視/編輯</button>
                                                    <button onClick={()=>handleDeleteOrder(o.id)} className="text-xs text-red-500 hover:underline">刪除紀錄</button>
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-20 text-[10px] sm:text-xs">
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center ${activeTab==='dashboard'?'text-blue-600':'text-gray-400'}`}><Calendar size={20}/><span>看板</span></button>
                        <button onClick={()=>setActiveTab('vehicles')} className={`flex flex-col items-center ${activeTab==='vehicles'?'text-blue-600':'text-gray-400'}`}><Car size={20}/><span>車輛</span></button>
                        <button onClick={()=>setActiveTab('orders')} className={`flex flex-col items-center ${activeTab==='orders'?'text-blue-600':'text-gray-400'}`}><Users size={20}/><span>當前訂單</span></button>
                        <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center ${activeTab==='history'?'text-blue-600':'text-gray-400'}`}><History size={20}/><span>歷史紀錄</span></button>
                    </div>

                    {isOrderModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md sm:rounded-xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl animate-slide-up sm:animate-fade-in">
                                <div className="p-4 border-b bg-slate-50 rounded-t-2xl sm:rounded-t-xl flex justify-between items-center sticky top-0">
                                    <h3 className="font-bold text-lg text-slate-800">{editingOrder?'編輯訂單':'新增訂單'}</h3>
                                    <button onClick={()=>setIsOrderModalOpen(false)} className="bg-slate-200 hover:bg-slate-300 rounded-full p-1 transition-colors"><X size={18} className="text-slate-600"/></button>
                                </div>
                                <form onSubmit={handleSaveOrder} className="p-4 overflow-y-auto space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-600 block mb-1">客戶姓名 <span className="text-red-500">*</span></label>
                                        <input placeholder="輸入客戶姓名或代號" className="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition-all" value={orderFormData.customer} onChange={e=>setOrderFormData({...orderFormData, customer:e.target.value})} required/>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        <div>
                                            <label className="text-xs font-bold text-green-700 block mb-1">取車時間 <span className="text-red-500">*</span></label>
                                            <input type="datetime-local" className="w-full border border-slate-300 p-2 rounded-md text-sm focus:ring-2 focus:ring-green-200 outline-none transition-all bg-white" value={orderFormData.start} onChange={e=>setOrderFormData({...orderFormData, start:e.target.value})} required/>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-red-700 block mb-1">還車時間 <span className="text-red-500">*</span></label>
                                            <input type="datetime-local" className="w-full border border-slate-300 p-2 rounded-md text-sm focus:ring-2 focus:ring-red-200 outline-none transition-all bg-white" value={orderFormData.end} onChange={e=>setOrderFormData({...orderFormData, end:e.target.value})} required/>
                                        </div>
                                    </div>

                                    {/* 地點選擇 */}
                                    <datalist id="location-options">
                                        {PRESET_LOCATIONS.map(loc => <option key={loc} value={loc} />)}
                                    </datalist>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">交車地點</label>
                                            <input 
                                                list="location-options"
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-200 outline-none transition-all" 
                                                placeholder="選擇或輸入"
                                                value={orderFormData.pickupLocation} 
                                                onChange={e=>setOrderFormData({...orderFormData, pickupLocation:e.target.value})} 
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">還車地點</label>
                                            <input 
                                                list="location-options"
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-200 outline-none transition-all" 
                                                placeholder="選擇或輸入"
                                                value={orderFormData.returnLocation} 
                                                onChange={e=>setOrderFormData({...orderFormData, returnLocation:e.target.value})} 
                                            />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="text-xs font-bold text-slate-600 block mb-1">訂單狀態</label>
                                        <select 
                                            className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                                            value={orderFormData.status} 
                                            onChange={e=>setOrderFormData({...orderFormData, status:e.target.value})}
                                        >
                                            <option value="confirmed">正常 (依時間自動判斷狀態)</option>
                                            <option value="cancelled">已取消 (退單/未出席)</option>
                                        </select>
                                    </div>

                                    {/* 備註欄位 */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-600 block mb-1">備註事項 (選填)</label>
                                        <textarea 
                                            className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-200 outline-none transition-all" 
                                            rows="2"
                                            placeholder="航班號碼、嬰兒座椅等特殊需求..."
                                            value={orderFormData.note} 
                                            onChange={e=>setOrderFormData({...orderFormData, note:e.target.value})} 
                                        ></textarea>
                                    </div>

                                    <div className="pt-2">
                                        <label className="text-xs font-bold text-slate-600 block mb-2">指派車輛 <span className="text-red-500">*</span></label>
                                        <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                                            {vehicles.map(v=>{
                                                const available = isVehicleAvailable(v.id, orderFormData.start, orderFormData.end, editingOrder?.id);
                                                // 修正：移除 Number() 轉型，因為 Firestore ID 是字串
                                                const isSelected = orderFormData.vehicleId === v.id;
                                                return (
                                                    <label 
                                                        key={v.id} 
                                                        className={`
                                                            relative flex items-center justify-between p-3 border rounded-lg cursor-pointer transition-all
                                                            ${isSelected ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-200 shadow-sm' : 'border-slate-200 hover:bg-slate-50'}
                                                            ${!available ? 'opacity-40 bg-slate-100 cursor-not-allowed grayscale-[50%]' : ''}
                                                        `}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            {/* 選取狀態：改用 CheckCircle 圖示 */}
                                                            {isSelected ? (
                                                                <CheckCircle className="w-5 h-5 text-blue-600 flex-shrink-0" />
                                                            ) : (
                                                                <div className="w-5 h-5 rounded-full border-2 border-slate-300 flex-shrink-0" />
                                                            )}
                                                            
                                                            <div className="flex flex-col">
                                                                <div className={`font-bold text-sm ${isSelected ? 'text-blue-900' : 'text-slate-800'}`}>
                                                                    {v.plate} 
                                                                </div>
                                                                <div className="text-xs text-slate-500 flex flex-wrap gap-1 items-center mt-0.5">
                                                                    <span className="font-medium text-slate-600">{v.model}</span>
                                                                    {v.feature && <><span className="text-slate-300">|</span><span className="text-blue-600">{v.feature}</span></>}
                                                                    {v.tire && <><span className="text-slate-300">|</span><span>{v.tire}</span></>}
                                                                    {v.seats && <><span className="text-slate-300">|</span><span>{v.seats}座</span></>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                        {!available && <span className="text-[10px] text-red-600 font-bold px-1.5 py-0.5 bg-red-100 border border-red-200 rounded whitespace-nowrap">時段衝突</span>}
                                                        
                                                        {/* 隱藏的原生 Radio */}
                                                        <input 
                                                            type="radio" 
                                                            name="vid" 
                                                            className="hidden" 
                                                            checked={isSelected} 
                                                            onChange={()=> available && setOrderFormData({...orderFormData, vehicleId:v.id})} 
                                                            disabled={!available} 
                                                        />
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 justify-end pt-4 border-t mt-4 sticky bottom-0 bg-white pb-2">
                                        <button type="button" onClick={()=>setIsOrderModalOpen(false)} className="flex-1 py-3 border border-slate-300 rounded-lg font-bold text-slate-600 hover:bg-slate-50 transition-colors">取消</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-md">儲存訂單</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isVehicleModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md sm:rounded-xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl animate-slide-up sm:animate-fade-in">
                                <div className="p-4 border-b bg-slate-50 rounded-t-2xl sm:rounded-t-xl flex justify-between items-center sticky top-0">
                                    <h3 className="font-bold text-lg text-slate-800">{editingVehicle?'編輯車輛':'新增車輛'}</h3>
                                    <button onClick={()=>setIsVehicleModalOpen(false)} className="bg-slate-200 hover:bg-slate-300 rounded-full p-1 transition-colors"><X size={18} className="text-slate-600"/></button>
                                </div>
                                <form onSubmit={handleSaveVehicle} className="p-4 overflow-y-auto space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-600 block mb-1">車牌號碼 <span className="text-red-500">*</span></label>
                                        <input placeholder="例: 品川300わ1234" className="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition-all font-bold text-slate-800" value={vehicleFormData.plate} onChange={e=>setVehicleFormData({...vehicleFormData, plate:e.target.value})} required/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">車型 <span className="text-red-500">*</span></label>
                                            <input placeholder="例: Alphard" className="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition-all" value={vehicleFormData.model} onChange={e=>setVehicleFormData({...vehicleFormData, model:e.target.value})} required/>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">特徵標籤</label>
                                            <input placeholder="例: HEV 4WD" className="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition-all" value={vehicleFormData.feature} onChange={e=>setVehicleFormData({...vehicleFormData, feature:e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-[1fr_2fr] gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">座位數</label>
                                            <div className="relative">
                                                <input type="number" placeholder="7" className="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition-all pr-8" value={vehicleFormData.seats} onChange={e=>setVehicleFormData({...vehicleFormData, seats:e.target.value})} />
                                                <span className="absolute right-3 top-3 text-slate-400 text-sm">座</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-600 block mb-1">輪胎狀態</label>
                                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                                <label className={`flex-1 text-center py-1.5 rounded-md text-sm font-bold cursor-pointer transition-colors ${vehicleFormData.tire === '冬済' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-200'}`}>
                                                    <input type="radio" name="tire" value="冬済" className="hidden" checked={vehicleFormData.tire === '冬済'} onChange={e=>setVehicleFormData({...vehicleFormData, tire:e.target.value})}/>
                                                    ❄️ 冬胎
                                                </label>
                                                <label className={`flex-1 text-center py-1.5 rounded-md text-sm font-bold cursor-pointer transition-colors ${vehicleFormData.tire === '夏済' ? 'bg-white shadow text-orange-600' : 'text-slate-500 hover:bg-slate-200'}`}>
                                                    <input type="radio" name="tire" value="夏済" className="hidden" checked={vehicleFormData.tire === '夏済'} onChange={e=>setVehicleFormData({...vehicleFormData, tire:e.target.value})}/>
                                                    ☀️ 夏胎
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <label className="text-xs font-bold text-slate-700 block mb-2 flex items-center gap-1"><CreditCard size={14}/> ETC 綁定設定</label>
                                        <select className="w-full border border-slate-300 rounded-lg p-2.5 font-mono text-sm mb-2 focus:ring-2 focus:ring-blue-200 outline-none bg-white" value={vehicleFormData.etc} onChange={e=>setVehicleFormData({...vehicleFormData, etc:e.target.value})}>
                                                <option value="">-- 不綁定 ETC --</option>
                                                {Array.from(new Set(vehicles.map(v=>v.etc).filter(Boolean))).concat(newEtcNumber ? [newEtcNumber] : []).map(etc => {
                                                    const owner = vehicles.find(v => v.etc === etc);
                                                    const isUsed = owner && owner.id !== editingVehicle?.id;
                                                    return <option key={etc} value={etc}>{etc} {isUsed ? `(目前由 ${owner.plate} 使用)` : ''}</option>
                                                })}
                                        </select>
                                        <div className="flex gap-2 items-center mt-3 pt-3 border-t border-slate-200">
                                            <span className="text-xs text-slate-500 whitespace-nowrap">新增卡號</span>
                                            <input placeholder="輸入新 ETC 卡號" className="flex-1 border border-slate-300 rounded-lg p-2 text-sm font-mono focus:ring-2 focus:ring-blue-200 outline-none" value={newEtcNumber} onChange={e=>setNewEtcNumber(e.target.value)}/>
                                            <button type="button" onClick={()=>newEtcNumber && (setVehicleFormData({...vehicleFormData, etc:newEtcNumber}), setNewEtcNumber(''))} className="px-3 py-1 bg-green-500 text-white rounded text-xs whitespace-nowrap">新增</button>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 justify-end pt-2">
                                        <button type="button" onClick={()=>setIsVehicleModalOpen(false)} className="px-4 py-2 border rounded hover:bg-slate-50 text-slate-700">取消</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<VehicleOrderSystem />);
    </script>
</body>
</html>
