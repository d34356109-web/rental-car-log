<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛訂單管理系統 PRO (極致調度版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Firebase Importmap -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f1f5f9; }
        #root:empty { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="number"]::-webkit-outer-spin-button, 
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar, Car, Users, CreditCard, Snowflake, Sun,
            Plus, Search, Edit3, Trash2, Clock, Save, X, 
            LogOut, ShieldCheck, Database, CheckCircle, ArrowRight, AlertCircle,
            ChevronDown, ChevronUp, BellRing, AlertTriangle, MapPin, RotateCcw,
            History, Activity, Zap, CheckCircle2, Navigation
        } from 'lucide-react';

        // --- Firebase 設定 ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, 
            serverTimestamp 
        } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDq65URVL5sppv-2yXBh8DQuEwaXm5u5k0",
            authDomain: "myrentalcarsystem-a88fb.firebaseapp.com",
            projectId: "myrentalcarsystem-a88fb",
            storageBucket: "myrentalcarsystem-a88fb.firebasestorage.app",
            messagingSenderId: "1076727464488",
            appId: "1:1076727464488:web:9599c788414f5211896b1d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 預設資料
        const INITIAL_VEHICLES_SEED = [
            { location: '成田', plate: '成田330わ888', brand: 'Toyota', model: 'Vellfire', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4861 3901 001', tire: '冬済', status: 'active' },
            { location: '成田', plate: '和泉330わ2222', brand: 'Toyota', model: 'Alphard', feature: '', seats: 8, etc: '8001 6161 4860 7900 000', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ334わ8888', brand: 'Toyota', model: 'Alphard', feature: '40系 Captain', seats: 7, etc: '7804 2150 2134 9280', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ335わ8888', brand: 'Toyota', model: 'Alphard', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4860 6901 000', tire: '冬済', status: 'active' },           
            { location: '成田', plate: '柏300わ2258', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8001 6161 4861 4901 000', tire: '冬済', status: 'active' },
            { location: '成田', plate: '柏300わ2588', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8001 6161 4860 9901 007', tire: '冬済', status: 'active' },
            { location: '成田', plate: '柏300わ2599', brand: 'Toyota', model: 'Alphard', feature: '4WD', seats: 7, etc: '8001 6161 4860 0901 006', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ342わ88', brand: 'Toyota', model: 'Vellfire', feature: '', seats: 7, etc: '', tire: '冬済', status: 'active' }
        ];
        const PRESET_LOCATIONS = ["成田二航", "成田一航", "羽田"];

        // --- 時間工具 ---
        const getJSTNominalDate = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
        const getJSTString = (dateObj) => {
            const pad = n => String(n).padStart(2, '0');
            return `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}T${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}`;
        };
        const getNextHourJSTString = () => {
            let d = getJSTNominalDate();
            d.setHours(d.getHours() + 1, 0, 0, 0);
            return getJSTString(d);
        };

        function VehicleOrderSystem() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [realTime, setRealTime] = useState(new Date());

            const [dialog, setDialog] = useState({ isOpen: false, message: '', type: 'alert', onConfirm: null });
            const [expandedCards, setExpandedCards] = useState({});

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [editingOrder, setEditingOrder] = useState(null);
            const [isVehicleModalOpen, setIsVehicleModalOpen] = useState(false);
            const [editingVehicle, setEditingVehicle] = useState(null);
            
            // 🔥 新增：管理排休彈窗 與 ETC 新卡號
            const [isVacationModalOpen, setIsVacationModalOpen] = useState(false);
            const [newEtcNumber, setNewEtcNumber] = useState('');

            const [searchTerm, setSearchTerm] = useState('');
            const [historySearchTerm, setHistorySearchTerm] = useState('');
            const [filterDateTime, setFilterDateTime] = useState(() => getJSTString(getJSTNominalDate()));

            const [orderFormData, setOrderFormData] = useState({
                customer: '', start: '', end: '', vehicleId: '', note: '', status: 'confirmed', pickupLocation: '成田二航', returnLocation: '成田二航'
            });
            const [vehicleFormData, setVehicleFormData] = useState({
                location: '成田', plate: '', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '', tire: '冬済', status: 'active'
            });

            const showAlert = (message) => setDialog({ isOpen: true, message, type: 'alert' });
            const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, message, type: 'confirm', onConfirm });

            // 時鐘
            useEffect(() => {
                const timer = setInterval(() => setRealTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Firebase 監聽
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const unsubV = onSnapshot(collection(db, 'vehicles'), snap => {
                            setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setIsLoading(false);
                        });
                        const unsubO = onSnapshot(collection(db, 'orders'), snap => setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                        return () => { unsubV(); unsubO(); };
                    } else setIsLoading(false);
                });
            }, []);

            // 格式化工具
            const formatDateTime = iso => {
                if (!iso) return '';
                const d = new Date(iso);
                return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            };
            const formatDateOnly = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} (週${days[d.getDay()]})`;
            };
            const formatShortDateWithDay = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}(週${days[d.getDay()]})`;
            };
            const formatTimeUntil = (iso, targetTimeISO) => {
                if (!iso) return '無排程';
                const d = new Date(iso), t = new Date(targetTimeISO);
                const isSameDay = d.toDateString() === t.toDateString();
                const hm = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                return isSameDay ? `本日 ${hm}` : `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${hm}`;
            };

            const liveTimeDisplay = useMemo(() => {
                return realTime.toLocaleString('zh-TW', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            }, [realTime]);

            // 核心邏輯
            const isVehicleAvailable = (vid, start, end, excludeId) => {
                if (!start || !end) return true;
                const s = new Date(start), e = new Date(end), now = getJSTNominalDate();
                const v = vehicles.find(v => v.id === vid);
                if (v?.status === 'maintenance' && e > now) return false;
                return !orders.some(o => o.vehicleId === vid && o.id !== excludeId && o.status !== 'cancelled' && s < new Date(o.end) && e > new Date(o.start));
            };

            const isOrderActiveAtTime = (order, targetTimeStr) => {
                const t = new Date(targetTimeStr), s = new Date(order.start), e = new Date(order.end);
                return t >= s && t <= e && order.status !== 'cancelled';
            };

            const handleSeedData = () => {
                showConfirm(`確定匯入預設車輛嗎？`, async () => {
                    try {
                        const existingPlates = vehicles.map(v => v.plate);
                        const newVehicles = INITIAL_VEHICLES_SEED.filter(v => !existingPlates.includes(v.plate));
                        if (newVehicles.length === 0) return showAlert("預設車輛已存在，無需匯入");
                        await Promise.all(newVehicles.map(v => addDoc(collection(db, 'vehicles'), { ...v, createdAt: serverTimestamp() })));
                        showAlert(`成功匯入 ${newVehicles.length} 台新車輛！`);
                    } catch (e) { showAlert("失敗: " + e.message); }
                });
            };

            const dashboardStats = useMemo(() => {
                const nowStr = filterDateTime;
                let activeCount = 0, maintenanceCount = 0, availableCount = 0;
                vehicles.forEach(v => {
                    if (v.status === 'maintenance') { maintenanceCount++; return; }
                    const isActive = orders.some(o => o.vehicleId === v.id && isOrderActiveAtTime(o, nowStr));
                    if (isActive) activeCount++;
                    else availableCount++;
                });
                return { total: vehicles.length, active: activeCount, maintenance: maintenanceCount, available: availableCount };
            }, [vehicles, orders, filterDateTime]);

            const sortedVehicles = useMemo(() => {
                const targetTime = new Date(filterDateTime);
                return vehicles.map(v => {
                    const isMaintenance = v.status === 'maintenance';
                    const dayOrders = orders.filter(o => o.vehicleId === v.id && o.status !== 'cancelled' && new Date(o.end) > new Date(new Date(filterDateTime).setHours(0,0,0,0)));
                    const activeOrder = dayOrders.find(o => isOrderActiveAtTime(o, filterDateTime));
                    const futureOrders = dayOrders.filter(o => !isOrderActiveAtTime(o, filterDateTime) && new Date(o.start) > targetTime);
                    const absoluteNextOrder = orders.filter(o => o.vehicleId === v.id && o.status !== 'cancelled' && new Date(o.start) > targetTime).sort((a,b)=>new Date(a.start)-new Date(b.start))[0];
                    
                    let sortWeight = isMaintenance ? 4 : (activeOrder ? 1 : (absoluteNextOrder ? 2 : 3));
                    let sortTime = activeOrder ? new Date(activeOrder.end).getTime() : (absoluteNextOrder ? new Date(absoluteNextOrder.start).getTime() : 0);
                    
                    return { ...v, activeOrder, futureOrders, absoluteNextOrder, isMaintenance, sortWeight, sortTime, dayOrders };
                }).sort((a, b) => a.sortWeight !== b.sortWeight ? a.sortWeight - b.sortWeight : a.sortTime - b.sortTime);
            }, [vehicles, orders, filterDateTime]);

            const availableVehicles = useMemo(() => sortedVehicles.filter(v => !v.activeOrder && !v.isMaintenance), [sortedVehicles]);

            // 人員排休計算
            const freeDaysData = useMemo(() => {
                const targetDate = new Date(filterDateTime);
                const startOfTargetDay = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate(), 0, 0, 0);
                const validOrders = orders.filter(o => o.status !== 'cancelled');
                
                let maxDate = startOfTargetDay, hasFutureEvents = false;
                validOrders.forEach(o => {
                    const oStart = new Date(o.start), oEnd = new Date(o.end);
                    if (oStart > maxDate) { maxDate = oStart; hasFutureEvents = true; }
                    if (oEnd > maxDate) { maxDate = oEnd; hasFutureEvents = true; }
                });

                const freeDatesList = [];
                if (!hasFutureEvents) return { list: [], maxDate: maxDate, hasFutureEvents: false };

                const endOfMaxDay = new Date(maxDate.getFullYear(), maxDate.getMonth(), maxDate.getDate(), 23, 59, 59);
                let currentDate = new Date(startOfTargetDay);
                
                while (currentDate <= endOfMaxDay) {
                    const dayStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 0, 0, 0);
                    const dayEnd = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 23, 59, 59);
                    
                    const hasEventOnThisDay = validOrders.some(o => {
                        const oStart = new Date(o.start), oEnd = new Date(o.end);
                        return (oStart >= dayStart && oStart <= dayEnd) || (oEnd >= dayStart && oEnd <= dayEnd);
                    });
                    
                    if (!hasEventOnThisDay) freeDatesList.push(new Date(dayStart));
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                const grouped = [];
                if (freeDatesList.length > 0) {
                    let currentGroup = [freeDatesList[0]];
                    for (let i = 1; i < freeDatesList.length; i++) {
                        const prev = freeDatesList[i-1], curr = freeDatesList[i];
                        if (Math.round(Math.abs(curr - prev) / (1000 * 60 * 60 * 24)) === 1) currentGroup.push(curr);
                        else { grouped.push(currentGroup); currentGroup = [curr]; }
                    }
                    grouped.push(currentGroup);
                }
                
                return { list: grouped, maxDate: endOfMaxDay, hasFutureEvents: true };
            }, [orders, filterDateTime]);

            const weeklyReminders = useMemo(() => {
                const targetJstDate = getJSTNominalDate(); 
                const startWindow = new Date(`${filterDateTime.split('T')[0]}T00:00:00`); 
                const endWindow = new Date(startWindow);
                endWindow.setDate(endWindow.getDate() + 14); 

                const events = [];
                orders.forEach(o => {
                    if (o.status === 'cancelled') return;
                    const startDate = new Date(o.start), endDate = new Date(o.end);
                    const vehicle = vehicles.find(v => v.id === o.vehicleId);
                    if (!vehicle) return;

                    if (startDate >= startWindow && startDate <= endWindow && startDate > targetJstDate) 
                        events.push({ id: `start-${o.id}`, type: 'pickup', time: startDate, order: o, vehicle });
                    if (endDate >= startWindow && endDate <= endWindow && endDate > targetJstDate) 
                        events.push({ id: `end-${o.id}`, type: 'return', time: endDate, order: o, vehicle });
                });
                return events.sort((a, b) => a.time - b.time);
            }, [orders, vehicles, filterDateTime]);

            const { activeOrders, historyOrders } = useMemo(() => {
                const now = getJSTNominalDate();
                const active = [], history = [];
                orders.forEach(o => {
                    if (o.status === 'cancelled' || new Date(o.end) < now) history.push(o);
                    else active.push(o);
                });
                return { activeOrders: active, historyOrders: history };
            }, [orders, realTime]); 

            const originalVehicle = editingOrder ? vehicles.find(v => v.id === editingOrder.vehicleId) : null;
            const isOriginalMaintenance = originalVehicle && originalVehicle.status === 'maintenance' && new Date(editingOrder?.end) > getJSTNominalDate();

            const handleQuickReturn = (order) => {
                showConfirm(`確定將 ${order.customer} 的訂單標記為「已提早歸還」嗎？\n(還車時間將改為現在)`, async () => {
                    try {
                        const now = getJSTString(getJSTNominalDate());
                        await updateDoc(doc(db, 'orders', order.id), { end: now, updatedAt: serverTimestamp() });
                        showAlert("✅ 車輛已歸還，訂單已移至歷史紀錄！");
                    } catch(e) { showAlert("錯誤: " + e.message); }
                });
            };

            const handleEditOrder = (o) => {
                const carInfo = vehicles.find(x => x.id === o.vehicleId);
                const isFuture = new Date(o.end) > getJSTNominalDate();
                setEditingOrder(o);
                setOrderFormData({
                    ...o, 
                    vehicleId: (carInfo && carInfo.status === 'maintenance' && isFuture) ? '' : o.vehicleId
                }); 
                setIsOrderModalOpen(true);
            };

            const handleSaveOrder = async (e) => {
                e.preventDefault();
                if (!orderFormData.customer || !orderFormData.start || !orderFormData.end || !orderFormData.vehicleId) return showAlert("請填寫必填欄位");
                if (new Date(orderFormData.start) >= new Date(orderFormData.end)) return showAlert("時間錯誤，還車時間必須晚於取車時間");
                if (!isVehicleAvailable(orderFormData.vehicleId, orderFormData.start, orderFormData.end, editingOrder?.id)) return showAlert("所選車輛在該時段已被預約或處於維修狀態");

                try {
                    const data = { ...orderFormData, updatedAt: serverTimestamp() };
                    if (editingOrder) await updateDoc(doc(db, 'orders', editingOrder.id), data);
                    else await addDoc(collection(db, 'orders'), { ...data, createdAt: serverTimestamp() });
                    setIsOrderModalOpen(false);
                } catch (err) { showAlert("儲存失敗: " + err.message); }
            };

            const handleDeleteItem = (collectionName, id) => {
                showConfirm("資料刪除後無法復原，確定刪除?", async () => await deleteDoc(doc(db, collectionName, id)));
            };

            const calculateProgress = (start, end) => {
                const s = new Date(start).getTime(), e = new Date(end).getTime(), n = getJSTNominalDate().getTime();
                if (n < s) return 0;
                if (n > e) return 100;
                return Math.max(0, Math.min(100, ((n - s) / (e - s)) * 100));
            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-slate-400 bg-slate-50">載入雲端資料中...</div>;

            return (
                <div className="pb-24">
                    {/* 共用 Dialog */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                                <h3 className="font-bold text-lg mb-2 flex items-center gap-2">
                                    {dialog.type === 'confirm' ? <AlertTriangle className="text-amber-500"/> : <CheckCircle2 className="text-blue-500"/>}
                                    {dialog.type === 'confirm' ? '請確認操作' : '系統提示'}
                                </h3>
                                <p className="text-slate-600 mb-6 text-sm leading-relaxed">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'confirm' && (
                                        <button onClick={() => setDialog({ isOpen: false, type: 'alert' })} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-medium text-slate-700 transition-colors">取消</button>
                                    )}
                                    <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); setDialog({ isOpen: false, type: 'alert' }); }} className="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition-colors shadow-md">確定</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 頂部 Header */}
                    <nav className="bg-gradient-to-r from-slate-900 to-slate-800 text-white p-4 sticky top-0 z-20 shadow-lg flex justify-between items-center">
                        <div className="flex items-center gap-2 font-black tracking-wider text-lg">
                            <Car className="text-blue-400 fill-blue-400/20"/> 調度中心 <span className="text-xs bg-blue-600 px-1.5 py-0.5 rounded text-white ml-1">PRO</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-xs bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-700 font-mono flex items-center gap-2 shadow-inner">
                                <Clock size={12} className="text-blue-400"/>
                                <span>{liveTimeDisplay}</span> <span className="hidden sm:inline text-slate-400">JST</span>
                            </div>
                        </div>
                    </nav>

                    <main className="p-4 max-w-5xl mx-auto space-y-5">
                        
                        {vehicles.length < INITIAL_VEHICLES_SEED.length && !isLoading && (
                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl flex justify-between items-center shadow-sm">
                                <span className="text-sm text-blue-800 font-medium">快速開始：資料庫似乎缺少部分預設車輛</span>
                                <button onClick={handleSeedData} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 transition-colors text-white text-xs rounded-lg shadow-sm font-bold">一鍵補齊資料</button>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-4 gap-2 sm:gap-4">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-center">
                                        <span className="text-slate-400 text-[10px] sm:text-xs font-bold mb-1">總車數</span>
                                        <span className="text-xl sm:text-2xl font-black text-slate-700">{dashboardStats.total}</span>
                                    </div>
                                    <div className="bg-green-50 p-3 rounded-2xl shadow-sm border border-green-100 flex flex-col items-center justify-center text-center">
                                        <span className="text-green-600 text-[10px] sm:text-xs font-bold mb-1">在庫空車</span>
                                        <span className="text-xl sm:text-2xl font-black text-green-700">{dashboardStats.available}</span>
                                    </div>
                                    <div className="bg-blue-50 p-3 rounded-2xl shadow-sm border border-blue-100 flex flex-col items-center justify-center text-center">
                                        <span className="text-blue-600 text-[10px] sm:text-xs font-bold mb-1">出租中</span>
                                        <span className="text-xl sm:text-2xl font-black text-blue-700">{dashboardStats.active}</span>
                                    </div>

                                <div className="relative">
                                    <Search className="absolute left-3 top-2.5 w-4 h-4 text-slate-400" />
                                    <input type="text" placeholder="搜尋歷史紀錄..." className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-slate-500 outline-none shadow-sm" value={historySearchTerm} onChange={e => setHistorySearchTerm(e.target.value)}/>
                                </div>
                                <div className="space-y-2">
                                    {historyOrders.filter(o => !historySearchTerm || o.customer.includes(historySearchTerm)).sort((a,b)=>new Date(b.end)-new Date(a.end)).map(o => (
                                        <div key={o.id} className="bg-slate-50/80 p-3 rounded-xl border border-slate-200 flex justify-between items-center opacity-80 hover:opacity-100 transition-opacity">
                                            <div>
                                                <div className="font-bold text-slate-700 text-sm">{o.customer} <span className="text-[10px] font-normal text-slate-500 ml-1">{vehicles.find(v=>v.id===o.vehicleId)?.plate || '已刪除車輛'}</span></div>
                                                <div className="text-xs text-slate-500 font-mono mt-0.5">{formatDateTime(o.start)} - {formatDateTime(o.end)}</div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`text-[10px] px-2 py-0.5 rounded font-bold border ${o.status === 'cancelled' ? 'bg-slate-200 text-slate-600 border-slate-300' : 'bg-emerald-50 text-emerald-600 border-emerald-200'}`}>{o.status === 'cancelled' ? '已取消' : '已完成'}</span>
                                                <button onClick={()=>handleDeleteItem('orders', o.id)} className="text-slate-400 hover:text-rose-600"><Trash2 size={14}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 底部導覽列 */}
                    <div className="fixed bottom-0 left-0 right-0 glass-nav flex justify-around p-2 pb-safe z-30 sm:hidden">
                        {[ { id: 'dashboard', icon: Activity, label: '看板' }, { id: 'vehicles', icon: Car, label: '車隊' }, { id: 'orders', icon: Calendar, label: '任務' }, { id: 'history', icon: History, label: '紀錄' } ].map(tab => (
                            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-16 h-12 rounded-xl transition-all duration-200 ${activeTab === tab.id ? 'text-blue-600 font-bold scale-110' : 'text-slate-400 font-medium hover:bg-slate-100/50'}`}>
                                <tab.icon size={20} className="mb-0.5" strokeWidth={activeTab === tab.id ? 2.5 : 2}/>
                                <span className="text-[10px]">{tab.label}</span>
                            </button>
                        ))}
                    </div>
                    
                    {/* 桌面版導覽列 */}
                    <div className="hidden sm:flex fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-slate-300 rounded-full px-4 py-2 shadow-2xl z-30 gap-2 items-center border border-slate-700">
                        {[ { id: 'dashboard', icon: Activity, label: '營運看板' }, { id: 'vehicles', icon: Car, label: '車隊管理' }, { id: 'orders', icon: Calendar, label: '派單任務' }, { id: 'history', icon: History, label: '歷史歸檔' } ].map(tab => (
                            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-200 text-sm ${activeTab === tab.id ? 'bg-blue-600 text-white font-bold shadow-lg shadow-blue-500/30' : 'hover:bg-slate-800 hover:text-white font-medium'}`}>
                                <tab.icon size={16} strokeWidth={activeTab === tab.id ? 2.5 : 2}/>
                                <span>{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* 🔥 新增：人員排休分析 Modal */}
                    {isVacationModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl max-h-[90vh] flex flex-col shadow-2xl">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-emerald-50/50 rounded-t-3xl sm:rounded-t-2xl">
                                    <h3 className="font-black text-lg text-emerald-800 flex items-center gap-2"><Sun className="text-emerald-500"/> 人員可全日休假日期</h3>
                                    <button onClick={()=>setIsVacationModalOpen(false)} className="bg-white hover:bg-emerald-100 rounded-full p-2 text-emerald-600 shadow-sm"><X size={18}/></button>
                                </div>
                                <div className="p-6 overflow-y-auto bg-slate-50/50">
                                    {!freeDaysData.hasFutureEvents ? (
                                        <div className="text-center py-8">
                                            <div className="w-16 h-16 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4"><Sun size={32}/></div>
                                            <div className="text-emerald-700 font-bold text-lg mb-1">近期無任何排程</div>
                                            <div className="text-slate-500 text-sm">隨時都可以安排人員休假！</div>
                                        </div>
                                    ) : freeDaysData.list.length === 0 ? (
                                        <div className="text-center py-8 border-2 border-dashed border-slate-200 rounded-2xl bg-white">
                                            <div className="text-slate-400 font-medium mb-1">無法安排全日休假</div>
                                            <div className="text-slate-500 text-xs px-4">直至最後一筆行程前，每日皆需前往交/還車。</div>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="text-xs text-slate-500 flex items-center gap-1.5 bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm">
                                                <Navigation size={14} className="text-emerald-500"/>
                                                系統已幫您過濾掉需要「交車」或「還車」的日期。
                                            </div>
                                            <div className="grid grid-cols-1 gap-3">
                                                {freeDaysData.list.map((group, i) => {
                                                    const start = group[0], end = group[group.length - 1];
                                                    const isSingle = start.getTime() === end.getTime();
                                                    return (
                                                        <div key={i} className="bg-white border border-emerald-200 p-4 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-l-emerald-500">
                                                            <div className="font-bold text-slate-700">
                                                                {isSingle ? formatDateOnly(start) : `${formatDateOnly(start)} ~ ${formatShortDateWithDay(end)}`}
                                                            </div>
                                                            <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold">可排休</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 border-t border-slate-100 bg-white sm:rounded-b-2xl">
                                    <button onClick={()=>setIsVacationModalOpen(false)} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 shadow-lg">了解，關閉視窗</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 訂單 Modal */}
                    {isOrderModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-2xl max-h-[90vh] flex flex-col shadow-2xl">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-slate-800">{editingOrder ? '編輯派車任務' : '新建派車任務'}</h3>
                                    <button type="button" onClick={()=>setIsOrderModalOpen(false)} className="bg-slate-100 hover:bg-slate-200 rounded-full p-2"><X size={18}/></button>
                                </div>
                                <form onSubmit={handleSaveOrder} className="p-6 overflow-y-auto space-y-5">
                                    
                                    {isOriginalMaintenance && !orderFormData.vehicleId && (
                                        <div className="bg-rose-50 text-rose-700 p-4 rounded-xl border border-rose-200 text-sm flex items-start gap-2 shadow-sm animate-pulse">
                                            <AlertTriangle size={18} className="flex-shrink-0 mt-0.5"/>
                                            <div className="leading-relaxed font-bold">原指派車輛 <span className="bg-white px-1.5 py-0.5 rounded shadow-sm mx-1 text-rose-900">{originalVehicle.plate}</span> 已進廠維修，請從下方重新指派其他可用車輛！</div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">客戶名稱 *</label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium" placeholder="輸入客戶姓名或代號" value={orderFormData.customer} onChange={e=>setOrderFormData({...orderFormData, customer:e.target.value})} required/>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">取車時間 *</label>
                                            <input type="datetime-local" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono" value={orderFormData.start} onChange={e=>setOrderFormData({...orderFormData, start:e.target.value})} required/>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">還車時間 *</label>
                                            <input type="datetime-local" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono" value={orderFormData.end} onChange={e=>setOrderFormData({...orderFormData, end:e.target.value})} required/>
                                        </div>
                                    </div>

                                    <datalist id="locations">{PRESET_LOCATIONS.map(l => <option key={l} value={l} />)}</datalist>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">取車地</label>
                                            <input list="locations" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" value={orderFormData.pickupLocation} onChange={e=>setOrderFormData({...orderFormData, pickupLocation:e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">還車地</label>
                                            <input list="locations" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" value={orderFormData.returnLocation} onChange={e=>setOrderFormData({...orderFormData, returnLocation:e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">備註事項 (選填)</label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="航班號碼、特殊需求等" value={orderFormData.note} onChange={e=>setOrderFormData({...orderFormData, note:e.target.value})} />
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-2">指派車輛 *</label>
                                        <div className="space-y-2 max-h-48 overflow-y-auto pr-2">
                                            {vehicles.map(v => {
                                                const available = isVehicleAvailable(v.id, orderFormData.start, orderFormData.end, editingOrder?.id);
                                                const selected = orderFormData.vehicleId === v.id;
                                                return (
                                                    <label key={v.id} className={`flex items-center p-3 rounded-xl border-2 cursor-pointer transition-all ${selected ? 'border-blue-500 bg-blue-50/50' : 'border-slate-100 hover:border-slate-300 bg-white'} ${!available ? 'opacity-40 grayscale cursor-not-allowed' : ''}`}>
                                                        <input type="radio" name="vid" className="hidden" checked={selected} onChange={() => available && setOrderFormData({...orderFormData, vehicleId: v.id})} disabled={!available}/>
                                                        <div className={`w-5 h-5 rounded-full border-2 mr-3 flex items-center justify-center ${selected ? 'border-blue-500 bg-blue-500' : 'border-slate-300'}`}>
                                                            {selected && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className={`font-bold ${selected ? 'text-blue-900' : 'text-slate-700'}`}>{v.plate}</div>
                                                            <div className="text-[10px] text-slate-500">{v.model} {v.seats}座</div>
                                                        </div>
                                                        {!available && <span className="text-[10px] bg-rose-100 text-rose-700 px-2 py-1 rounded font-bold">{(v.status === 'maintenance' && new Date(orderFormData.end) > getJSTNominalDate()) ? '維修中' : '時間衝突'}</span>}
                                                    </label>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 pt-4 border-t border-slate-100">
                                        <button type="button" onClick={()=>setIsOrderModalOpen(false)} className="flex-1 py-3.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors">取消</button>
                                        <button type="submit" className="flex-1 py-3.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-lg shadow-slate-900/20">確認派車</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 車輛 Modal */}
                    {isVehicleModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl max-h-[90vh] flex flex-col shadow-2xl">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-xl text-slate-800">{editingVehicle ? '編輯車輛檔案' : '登錄新車輛'}</h3>
                                    <button type="button" onClick={()=>setIsVehicleModalOpen(false)} className="bg-slate-100 hover:bg-slate-200 rounded-full p-2"><X size={18}/></button>
                                </div>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const data = { ...vehicleFormData, updatedAt: serverTimestamp() };
                                    if (editingVehicle) await updateDoc(doc(db, 'vehicles', editingVehicle.id), data);
                                    else await addDoc(collection(db, 'vehicles'), { ...data, createdAt: serverTimestamp() });
                                    setIsVehicleModalOpen(false);
                                }} className="p-6 overflow-y-auto space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">車牌號碼 *</label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-800" value={vehicleFormData.plate} onChange={e=>setVehicleFormData({...vehicleFormData, plate:e.target.value})} required/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">車型 *</label><input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={vehicleFormData.model} onChange={e=>setVehicleFormData({...vehicleFormData, model:e.target.value})} required/></div>
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">特徵</label><input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={vehicleFormData.feature} onChange={e=>setVehicleFormData({...vehicleFormData, feature:e.target.value})} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">座位</label><input type="number" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={vehicleFormData.seats} onChange={e=>setVehicleFormData({...vehicleFormData, seats:e.target.value})} /></div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">營運狀態</label>
                                            <select className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold" value={vehicleFormData.status} onChange={e=>setVehicleFormData({...vehicleFormData, status:e.target.value})}>
                                                <option value="active">✅ 正常服役</option>
                                                <option value="maintenance">🔧 維修保養</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    {/* 🔥 優化：ETC 智能選單與新增卡號 */}
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                        <label className="text-xs font-bold text-slate-700 uppercase block mb-2 flex items-center gap-1.5"><CreditCard size={14} className="text-indigo-500"/> ETC 綁定設定</label>
                                        
                                        <select className="w-full bg-white border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm text-slate-700 mb-3 shadow-sm" value={vehicleFormData.etc} onChange={e=>setVehicleFormData({...vehicleFormData, etc:e.target.value})}>
                                            <option value="">-- 不綁定 ETC 卡片 --</option>
                                            {Array.from(new Set(vehicles.map(v=>v.etc).filter(Boolean))).concat(newEtcNumber ? [newEtcNumber] : []).map(etc => {
                                                const owner = vehicles.find(v => v.etc === etc);
                                                const isUsed = owner && owner.id !== editingVehicle?.id;
                                                return <option key={etc} value={etc}>{etc} {isUsed ? `(目前由 ${owner.plate} 使用)` : ''}</option>
                                            })}
                                        </select>

                                        <div className="flex gap-2 items-center pt-3 border-t border-slate-200/60">
                                            <input placeholder="拿到新卡？在此輸入新卡號" className="flex-1 bg-white border border-slate-200 p-2.5 rounded-xl text-sm font-mono focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" value={newEtcNumber} onChange={e=>setNewEtcNumber(e.target.value)}/>
                                            <button type="button" onClick={()=>{ if(newEtcNumber) { setVehicleFormData({...vehicleFormData, etc:newEtcNumber}); setNewEtcNumber(''); } }} className="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold transition-colors shadow-sm">登錄</button>
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-4 border-t border-slate-100">
                                        <button type="submit" className="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 shadow-lg">儲存檔案</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<VehicleOrderSystem />);
    </script>
</body>
</html>
