    <script type="importmap">
      {

<body class="text-slate-800 antialiased selection:bg-brand-100 selection:text-brand-900 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-50 via-slate-50 to-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar, Car, Users, CreditCard, Snowflake, Sun,
            Plus, Search, Edit3, Trash2, Clock, Save, X, 
            LogOut, ShieldCheck, Database, CheckCircle, ArrowRight, AlertCircle,
            ChevronDown, ChevronUp, BellRing, AlertTriangle, MapPin, RotateCcw,
            History, Activity, Zap, CheckCircle2, Navigation, Sparkles
        } from 'lucide-react';

        // --- Firebase 設定 ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, 
            serverTimestamp 
        } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDq65URVL5sppv-2yXBh8DQuEwaXm5u5k0",
            authDomain: "myrentalcarsystem-a88fb.firebaseapp.com",
            projectId: "myrentalcarsystem-a88fb",
            storageBucket: "myrentalcarsystem-a88fb.firebasestorage.app",
            messagingSenderId: "1076727464488",
            appId: "1:1076727464488:web:9599c788414f5211896b1d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 預設資料 (共 7 台車)
        const INITIAL_VEHICLES_SEED = [
            { location: '成田', plate: '成田330わ888', brand: 'Toyota', model: 'Vellfire', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4861 3901 001', tire: '冬済', status: 'active' },
            { location: '成田', plate: '和泉330わ2222', brand: 'Toyota', model: 'Alphard', feature: '', seats: 8, etc: '8001 6161 4860 7900 000', tire: '冬済', status: 'active' },
            { location: '成田', plate: '成田331わ 88', brand: 'Toyota', model: 'Alphard', feature: '', seats: 8, etc: '8001 6161 4860 7900 000', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ334わ8888', brand: 'Toyota', model: 'Alphard', feature: '40系 Captain', seats: 7, etc: '7804 2150 2134 9280', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ335わ8888', brand: 'Toyota', model: 'Alphard', feature: 'HEV 4WD', seats: 8, etc: '8001 6161 4860 6901 000', tire: '冬済', status: 'active' },           
            { location: '成田', plate: '和泉335わ9999', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '8001 6161 4860 0901 006', tire: '冬済', status: 'active' },
            { location: '成田', plate: 'なにわ342わ88', brand: 'Toyota', model: 'Vellfire', feature: '', seats: 7, etc: '', tire: '冬済', status: 'active' }
        ];
        const PRESET_LOCATIONS = ["成田二航", "成田一航", "羽田", "上野", "新宿"];

        // --- 時間工具 ---
        const getJSTNominalDate = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
        const getJSTString = (dateObj) => {
            const pad = n => String(n).padStart(2, '0');
            return `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}T${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}`;
        };
        const getNextHourJSTString = () => {
            let d = getJSTNominalDate();
            d.setHours(d.getHours() + 1, 0, 0, 0);
            return getJSTString(d);
        };

        function VehicleOrderSystem() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [realTime, setRealTime] = useState(new Date());

            const [dialog, setDialog] = useState({ isOpen: false, message: '', type: 'alert', onConfirm: null });
            const [expandedCards, setExpandedCards] = useState({});

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [editingOrder, setEditingOrder] = useState(null);
            const [isVehicleModalOpen, setIsVehicleModalOpen] = useState(false);
            const [editingVehicle, setEditingVehicle] = useState(null);
            
            const [isVacationModalOpen, setIsVacationModalOpen] = useState(false);
            const [newEtcNumber, setNewEtcNumber] = useState('');

            const [searchTerm, setSearchTerm] = useState('');
            const [historySearchTerm, setHistorySearchTerm] = useState('');
            const [filterDateTime, setFilterDateTime] = useState(() => getJSTString(getJSTNominalDate()));

            const [orderFormData, setOrderFormData] = useState({
                customer: '', start: '', end: '', vehicleId: '', note: '', status: 'confirmed', pickupLocation: '成田二航', returnLocation: '成田二航'
            });
            const [vehicleFormData, setVehicleFormData] = useState({
                location: '成田', plate: '', brand: 'Toyota', model: 'Alphard', feature: '', seats: 7, etc: '', tire: '冬済', status: 'active'
            });

            // 時鐘
            useEffect(() => {
                const timer = setInterval(() => setRealTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Firebase 監聽
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const unsubV = onSnapshot(collection(db, 'vehicles'), snap => {
                            setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setIsLoading(false);
                        });
                        const unsubO = onSnapshot(collection(db, 'orders'), snap => setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                        return () => { unsubV(); unsubO(); };
                    } else setIsLoading(false);
                });
            }, []);

            // 格式化工具
            const formatDateTime = iso => {
                if (!iso) return '';
                const d = new Date(iso);
                return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            };
            const formatDateOnly = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} (週${days[d.getDay()]})`;
            };
            const formatShortDateWithDay = (d) => {
                if (!d) return '';
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}(週${days[d.getDay()]})`;
            };
            const formatTimeUntil = (iso, targetTimeISO) => {
                if (!iso) return '無排程';
                const d = new Date(iso), t = new Date(targetTimeISO);
                const isSameDay = d.toDateString() === t.toDateString();
                const hm = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                return isSameDay ? `本日 ${hm}` : `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${hm}`;
            };

            const liveTimeDisplay = useMemo(() => {
                return realTime.toLocaleString('zh-TW', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            }, [realTime]);

            // 核心邏輯
            const isVehicleAvailable = (vid, start, end, excludeId) => {
                if (!start || !end || !vid) return true;
                const s = new Date(start), e = new Date(end), now = getJSTNominalDate();
                const v = vehicles.find(v => v.id === vid);
                if (v?.status === 'maintenance' && e > now) return false;
                return !orders.some(o => o.vehicleId === vid && o.id !== excludeId && o.status !== 'cancelled' && s < new Date(o.end) && e > new Date(o.start));
            };

            const isOrderActiveAtTime = (order, targetTimeStr) => {
                const t = new Date(targetTimeStr), s = new Date(order.start), e = new Date(order.end);
                return t >= s && t <= e && order.status !== 'cancelled';
            };

            const dashboardStats = useMemo(() => {
                const nowStr = filterDateTime;
                let activeCount = 0, maintenanceCount = 0, availableCount = 0;
                vehicles.forEach(v => {
                    if (v.status === 'maintenance') { maintenanceCount++; return; }
                    const isActive = orders.some(o => o.vehicleId === v.id && isOrderActiveAtTime(o, nowStr));
                    if (isActive) activeCount++;
                    else availableCount++;
                });
                return { total: vehicles.length, active: activeCount, maintenance: maintenanceCount, available: availableCount };
            }, [vehicles, orders, filterDateTime]);

            const sortedVehicles = useMemo(() => {
                const targetTime = new Date(filterDateTime);
                return vehicles.map(v => {
                    const isMaintenance = v.status === 'maintenance';
                    const dayOrders = orders.filter(o => o.vehicleId === v.id && o.status !== 'cancelled' && new Date(o.end) > new Date(new Date(filterDateTime).setHours(0,0,0,0)));
                    const activeOrder = dayOrders.find(o => isOrderActiveAtTime(o, filterDateTime));
                    const futureOrders = dayOrders.filter(o => !isOrderActiveAtTime(o, filterDateTime) && new Date(o.start) > targetTime);
                    const absoluteNextOrder = orders.filter(o => o.vehicleId === v.id && o.status !== 'cancelled' && new Date(o.start) > targetTime).sort((a,b)=>new Date(a.start)-new Date(b.start))[0];
                    
                    let sortWeight = isMaintenance ? 4 : (activeOrder ? 1 : (absoluteNextOrder ? 2 : 3));
                    let sortTime = activeOrder ? new Date(activeOrder.end).getTime() : (absoluteNextOrder ? new Date(absoluteNextOrder.start).getTime() : 0);
                    
                    return { ...v, activeOrder, futureOrders, absoluteNextOrder, isMaintenance, sortWeight, sortTime, dayOrders };
                }).sort((a, b) => a.sortWeight !== b.sortWeight ? a.sortWeight - b.sortWeight : a.sortTime - b.sortTime);
            }, [vehicles, orders, filterDateTime]);

            const availableVehicles = useMemo(() => sortedVehicles.filter(v => !v.activeOrder && !v.isMaintenance), [sortedVehicles]);

            const freeDaysData = useMemo(() => {
                const targetDate = new Date(filterDateTime);
                const startOfTargetDay = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate(), 0, 0, 0);
                const validOrders = orders.filter(o => o.status !== 'cancelled');
                
                let maxDate = startOfTargetDay, hasFutureEvents = false;
                validOrders.forEach(o => {
                    const oStart = new Date(o.start), oEnd = new Date(o.end);
                    if (oStart > maxDate) { maxDate = oStart; hasFutureEvents = true; }
                    if (oEnd > maxDate) { maxDate = oEnd; hasFutureEvents = true; }
                });

                const freeDatesList = [];
                if (!hasFutureEvents) return { list: [], maxDate: maxDate, hasFutureEvents: false };

                const endOfMaxDay = new Date(maxDate.getFullYear(), maxDate.getMonth(), maxDate.getDate(), 23, 59, 59);
                let currentDate = new Date(startOfTargetDay);
                
                while (currentDate <= endOfMaxDay) {
                    const dayStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 0, 0, 0);
                    const dayEnd = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate(), 23, 59, 59);
                    
                    const hasEventOnThisDay = validOrders.some(o => {
                        const oStart = new Date(o.start), oEnd = new Date(o.end);
                        return (oStart >= dayStart && oStart <= dayEnd) || (oEnd >= dayStart && oEnd <= dayEnd);
                    });
                    
                    if (!hasEventOnThisDay) freeDatesList.push(new Date(dayStart));
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                const grouped = [];
                if (freeDatesList.length > 0) {
                    let currentGroup = [freeDatesList[0]];
                    for (let i = 1; i < freeDatesList.length; i++) {
                        const prev = freeDatesList[i-1], curr = freeDatesList[i];
                        if (Math.round(Math.abs(curr - prev) / (1000 * 60 * 60 * 24)) === 1) currentGroup.push(curr);
                        else { grouped.push(currentGroup); currentGroup = [curr]; }
                    }
                    grouped.push(currentGroup);
                }
                
                return { list: grouped, maxDate: endOfMaxDay, hasFutureEvents: true };
            }, [orders, filterDateTime]);

            const weeklyReminders = useMemo(() => {
                const targetJstDate = getJSTNominalDate(); 
                const startWindow = new Date(`${filterDateTime.split('T')[0]}T00:00:00`); 
                const endWindow = new Date(startWindow);
                endWindow.setDate(endWindow.getDate() + 14); 

                const events = [];
                orders.forEach(o => {
                    if (o.status === 'cancelled') return;
                    const startDate = new Date(o.start), endDate = new Date(o.end);
                    const vehicle = vehicles.find(v => v.id === o.vehicleId); 

                    if (startDate >= startWindow && startDate <= endWindow && startDate > targetJstDate) 
                        events.push({ id: `start-${o.id}`, type: 'pickup', time: startDate, order: o, vehicle });
                    if (endDate >= startWindow && endDate <= endWindow && endDate > targetJstDate) 
                        events.push({ id: `end-${o.id}`, type: 'return', time: endDate, order: o, vehicle });
                });
                return events.sort((a, b) => a.time - b.time);
            }, [orders, vehicles, filterDateTime]);

            const { activeOrders, historyOrders } = useMemo(() => {
                const now = getJSTNominalDate();
                const active = [], history = [];
                orders.forEach(o => {
                    if (o.status === 'cancelled' || new Date(o.end) < now) history.push(o);
                    else active.push(o);
                });
                return { activeOrders: active, historyOrders: history };
            }, [orders, realTime]); 

            // --- 判斷原車是否維修中 ---
            const originalVehicle = editingOrder ? vehicles.find(v => v.id === editingOrder.vehicleId) : null;
            const isOriginalMaintenance = originalVehicle && originalVehicle.status === 'maintenance' && new Date(editingOrder?.end) > getJSTNominalDate();

            const calculateProgress = (start, end) => {
                const s = new Date(start).getTime(), e = new Date(end).getTime(), n = getJSTNominalDate().getTime();
                if (n < s) return 0;
                if (n > e) return 100;
                return Math.max(0, Math.min(100, ((n - s) / (e - s)) * 100));
            };

            const toggleExpand = (id) => setExpandedCards(prev => ({ ...prev, [id]: !prev[id] }));

            // --- 異動 Actions ---
            const handleSeedData = () => {
                setDialog({
                    isOpen: true,
                    type: 'confirm',
                    message: `確定匯入這 ${INITIAL_VEHICLES_SEED.length} 台預設車輛嗎？`,
                    onConfirm: async () => {
                        try {
                            const existingPlates = vehicles.map(v => v.plate);
                            const newVehicles = INITIAL_VEHICLES_SEED.filter(v => !existingPlates.includes(v.plate));
                            if (newVehicles.length === 0) return setTimeout(() => setDialog({ isOpen: true, message: "預設車輛已存在，無需重複匯入", type: 'alert' }), 300);
                            await Promise.all(newVehicles.map(v => addDoc(collection(db, 'vehicles'), { ...v, createdAt: serverTimestamp() })));
                            setTimeout(() => setDialog({ isOpen: true, message: `成功匯入 ${newVehicles.length} 台新車輛！`, type: 'alert' }), 300);
                        } catch (e) { setTimeout(() => setDialog({ isOpen: true, message: "失敗: " + e.message, type: 'alert' }), 300); }
                    }
                });
            };

            const handleEditOrder = (o) => {
                const carInfo = vehicles.find(x => x.id === o.vehicleId);
                const isFuture = new Date(o.end) > getJSTNominalDate();
                setEditingOrder(o);
                setOrderFormData({
                    ...o, 
                    vehicleId: (carInfo && carInfo.status === 'maintenance' && isFuture) ? '' : (o.vehicleId || '')
                }); 
                setIsOrderModalOpen(true);
            };

            const handleSaveOrder = async (e) => {
                e.preventDefault();
                if (!orderFormData.customer || !orderFormData.start || !orderFormData.end) {
                    return setDialog({ isOpen: true, message: "請填寫必填欄位 (客戶名稱、取/還車時間)", type: 'alert' });
                }
                if (new Date(orderFormData.start) >= new Date(orderFormData.end)) {
                    return setDialog({ isOpen: true, message: "時間錯誤，還車時間必須晚於取車時間", type: 'alert' });
                }
                
                if (orderFormData.vehicleId && !isVehicleAvailable(orderFormData.vehicleId, orderFormData.start, orderFormData.end, editingOrder?.id)) {
                    return setDialog({ isOpen: true, message: "所選車輛在該時段已被預約或處於維修狀態", type: 'alert' });
                }

                try {
                    const data = { ...orderFormData, updatedAt: serverTimestamp() };
                    if (editingOrder) await updateDoc(doc(db, 'orders', editingOrder.id), data);
                    else await addDoc(collection(db, 'orders'), { ...data, createdAt: serverTimestamp() });
                    setIsOrderModalOpen(false);
                } catch (err) { setDialog({ isOpen: true, message: "儲存失敗: " + err.message, type: 'alert' }); }
            };

            const handleQuickReturn = (order) => {
                setDialog({
                    isOpen: true,
                    type: 'confirm',
                    message: `確定將 ${order.customer} 的訂單標記為「已提早歸還」嗎？\n(還車時間將改為現在)`,
                    onConfirm: async () => {
                        try {
                            const now = getJSTString(getJSTNominalDate());
                            await updateDoc(doc(db, 'orders', order.id), { end: now, updatedAt: serverTimestamp() });
                            setTimeout(() => setDialog({ isOpen: true, message: "✅ 車輛已歸還，訂單已移至歷史紀錄！", type: 'alert' }), 300);
                        } catch(e) { setTimeout(() => setDialog({ isOpen: true, message: "錯誤: " + e.message, type: 'alert' }), 300); }
                    }
                });
            };

            const handleDeleteOrder = (id) => {
                setDialog({
                    isOpen: true,
                    type: 'confirm',
                    message: "資料刪除後無法復原，確定要永久刪除此訂單嗎？",
                    onConfirm: async () => {
                        try {
                            await deleteDoc(doc(db, 'orders', id));
                            setIsOrderModalOpen(false); // 如果是在編輯模式中刪除，連帶關閉 Modal
                        } catch (error) {
                            setTimeout(() => setDialog({ isOpen: true, message: '刪除失敗：' + error.message, type: 'alert' }), 300);
                        }
                    }
                });
            };

            const handleSaveVehicle = async (e) => {
                e.preventDefault();
                try {
                    const data = { ...vehicleFormData, updatedAt: serverTimestamp() };
                    if (editingVehicle) await updateDoc(doc(db, 'vehicles', editingVehicle.id), data);
                    else await addDoc(collection(db, 'vehicles'), { ...data, createdAt: serverTimestamp() });
                    setIsVehicleModalOpen(false);
                } catch (err) { setDialog({ isOpen: true, message: "儲存失敗：" + err.message, type: 'alert' }); }
            };

            const handleDeleteVehicle = (id) => {
                setDialog({
                    isOpen: true,
                    type: 'confirm',
                    message: "資料刪除後無法復原，確定要從車隊移除此車輛嗎？",
                    onConfirm: async () => {
                        try {
                            await deleteDoc(doc(db, 'vehicles', id));
                        } catch (error) {
                            setTimeout(() => setDialog({ isOpen: true, message: '刪除失敗：' + error.message, type: 'alert' }), 300);
                        }
                    }
                });
            };

            if (isLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 space-y-4">
                    <div className="w-12 h-12 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div>
                    <p className="text-slate-500 font-medium tracking-widest animate-pulse">載入專業調度中心...</p>
                </div>
            );

            return (
                <div className="pb-28 md:pb-12 text-slate-800">
                    {/* 共用 Dialog */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm transition-all duration-300">

                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">還車地</label>
                                            <input list="locations" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 transition-all focus:bg-white" placeholder="選擇或輸入" value={orderFormData.returnLocation} onChange={e=>setOrderFormData({...orderFormData, returnLocation:e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">訂單狀態</label>
                                        <select className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 cursor-pointer transition-all focus:bg-white" value={orderFormData.status} onChange={e=>setOrderFormData({...orderFormData, status:e.target.value})}>
                                            <option value="confirmed">🟢 正常 (依時間自動判斷狀態)</option>
                                            <option value="cancelled">🔴 已取消 (退單/未出席)</option>
                                        </select>
                                    </div>

                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1.5">備註事項 <span className="text-slate-400 font-normal">(選填)</span></label>
                                        <textarea className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-700 resize-none transition-all focus:bg-white" rows="2" placeholder="航班號碼、特殊需求等" value={orderFormData.note} onChange={e=>setOrderFormData({...orderFormData, note:e.target.value})}></textarea>
                                    </div>

                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider block mb-3 flex justify-between items-center">
                                            <span>指派車輛</span>
                                            <span className="text-[10px] bg-amber-50 text-amber-600 border border-amber-200 px-2 py-0.5 rounded font-bold">可稍後再指派</span>
                                        </label>
                                        <div className="space-y-2 max-h-56 overflow-y-auto pr-2 pb-1">
                                            {/* 未分配選項 */}
                                            <label className={`relative flex items-center justify-between p-3.5 border rounded-xl cursor-pointer transition-all duration-200 ${!orderFormData.vehicleId ? 'border-amber-400 bg-amber-50/50 ring-1 ring-amber-400 shadow-md' : 'border-slate-100 hover:border-slate-300 bg-white'}`}>
                                                <div className="flex items-center gap-3.5">
                                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${!orderFormData.vehicleId ? 'border-amber-500 bg-amber-500' : 'border-slate-300'}`}>
                                                        {!orderFormData.vehicleId && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                                    </div>
                                                    <div className={`font-bold text-sm tracking-tight ${!orderFormData.vehicleId ? 'text-amber-800' : 'text-slate-600'}`}>
                                                        ⚠️ 尚未指派任何車輛
                                                    </div>
                                                </div>
                                                <input type="radio" name="vid" className="hidden" checked={!orderFormData.vehicleId} onChange={()=> setOrderFormData({...orderFormData, vehicleId: ''})}/>
                                            </label>

                                            {vehicles.map(v => {
                                                const available = isVehicleAvailable(v.id, orderFormData.start, orderFormData.end, editingOrder?.id);
                                                const selected = orderFormData.vehicleId === v.id;
                                                return (
                                                    <label key={v.id} className={`relative flex items-center justify-between p-3.5 border rounded-xl cursor-pointer transition-all duration-200 ${selected ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-500 shadow-sm' : 'border-slate-100 hover:border-slate-300 bg-white'} ${!available ? 'opacity-40 grayscale-[30%] cursor-not-allowed bg-slate-50' : ''}`}>
                                                        <div className="flex items-center gap-3.5">
                                                            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${selected ? 'border-blue-500 bg-blue-500' : 'border-slate-300'}`}>
                                                                {selected && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                                            </div>
                                                            <div className="flex-1">
                                                                <div className={`font-bold text-sm tracking-tight ${selected ? 'text-blue-900' : 'text-slate-700'}`}>{v.plate}</div>
                                                                <div className="text-[11px] text-slate-500 flex flex-wrap gap-1.5 items-center mt-0.5 font-medium">
                                                                    <span>{v.model}</span>
                                                                    {v.feature && <><span className="text-slate-300">|</span><span className="text-blue-600">{v.feature}</span></>}
                                                                    {v.seats && <><span className="text-slate-300">|</span><span>{v.seats}座</span></>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        {!available && <span className="text-[10px] bg-rose-100 text-rose-700 px-2 py-1 rounded-md font-bold whitespace-nowrap shadow-sm border border-rose-200">{(v.status === 'maintenance' && new Date(orderFormData.end) > getJSTNominalDate()) ? '維修中' : '時間衝突'}</span>}
                                                        <input type="radio" name="vid" className="hidden" checked={selected} onChange={() => available && setOrderFormData({...orderFormData, vehicleId: v.id})} disabled={!available}/>
                                                    </label>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 pt-4 mt-4 sticky bottom-0 bg-slate-50/90 backdrop-blur-md pb-2">
                                        {/* 編輯模式下的快速刪除按鈕 */}
                                        {editingOrder && (
                                            <button type="button" onClick={() => { setIsOrderModalOpen(false); setTimeout(() => handleDeleteOrder(editingOrder.id), 200); }} className="py-3.5 px-4 bg-rose-50 text-rose-600 border border-rose-200 rounded-xl font-bold hover:bg-rose-100 transition-colors shadow-sm flex justify-center items-center">
                                                <Trash2 size={20}/>
                                            </button>
                                        )}
                                        <button type="button" onClick={()=>setIsOrderModalOpen(false)} className="flex-1 py-3.5 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition-colors shadow-sm">取消</button>
                                        <button type="submit" className="flex-[2] py-3.5 bg-slate-900 text-white rounded-xl font-bold text-base tracking-wide hover:bg-slate-800 transition-all active:scale-[0.98] shadow-md shadow-slate-900/20">儲存訂單</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 車輛 Modal */}
                    {isVehicleModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm transition-all duration-300">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl max-h-[90vh] flex flex-col shadow-2xl animate-fade-in-up">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white sm:rounded-t-2xl rounded-t-3xl z-10 shrink-0">
                                    <h3 className="font-black text-xl text-slate-800 tracking-tight">{editingVehicle ? '編輯車輛檔案' : '登錄新車輛'}</h3>
                                    <button type="button" onClick={()=>setIsVehicleModalOpen(false)} className="bg-slate-100 hover:bg-slate-200 rounded-full p-2 text-slate-600 transition-colors"><X size={18}/></button>
                                </div>
                                <form onSubmit={handleSaveVehicle} className="p-6 overflow-y-auto space-y-5 bg-slate-50/50">
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">車牌號碼 <span className="text-rose-500">*</span></label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-800 text-base tracking-wide transition-all focus:bg-white" placeholder="例: 品川300わ1234" value={vehicleFormData.plate} onChange={e=>setVehicleFormData({...vehicleFormData, plate:e.target.value})} required/>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">車型 <span className="text-rose-500">*</span></label>
                                            <input className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all focus:bg-white font-bold text-slate-700" placeholder="例: Alphard" value={vehicleFormData.model} onChange={e=>setVehicleFormData({...vehicleFormData, model:e.target.value})} required/>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">特徵</label>
                                            <input className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all focus:bg-white font-bold text-slate-700" placeholder="例: HEV 4WD" value={vehicleFormData.feature} onChange={e=>setVehicleFormData({...vehicleFormData, feature:e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-[1fr_2fr] gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">座位</label>
                                            <div className="relative">
                                                <input type="number" className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none pr-8 transition-all focus:bg-white font-bold text-slate-700 text-center" placeholder="7" value={vehicleFormData.seats} onChange={e=>setVehicleFormData({...vehicleFormData, seats:e.target.value})} />
                                                <span className="absolute right-3 top-2.5 text-slate-400 text-sm font-bold">座</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">輪胎配置</label>
                                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                                <label className={`flex-1 text-center py-2 rounded-md text-sm font-bold cursor-pointer transition-all ${vehicleFormData.tire === '冬済' ? 'bg-white shadow-sm text-blue-600 ring-1 ring-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>
                                                    <input type="radio" name="tire" value="冬済" className="hidden" checked={vehicleFormData.tire === '冬済'} onChange={e=>setVehicleFormData({...vehicleFormData, tire:e.target.value})}/>
                                                    ❄️ 冬胎
                                                </label>
                                                <label className={`flex-1 text-center py-2 rounded-md text-sm font-bold cursor-pointer transition-all ${vehicleFormData.tire === '夏済' ? 'bg-white shadow-sm text-amber-600 ring-1 ring-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>
                                                    <input type="radio" name="tire" value="夏済" className="hidden" checked={vehicleFormData.tire === '夏済'} onChange={e=>setVehicleFormData({...vehicleFormData, tire:e.target.value})}/>
                                                    ☀️ 夏胎
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-700 block mb-3 uppercase tracking-wider">車輛營運狀態</label>
                                        <div className="flex gap-3">
                                            <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all ${vehicleFormData.status !== 'maintenance' ? 'bg-emerald-50 border-emerald-500 text-emerald-700 shadow-sm font-bold' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-500 font-medium'}`}>
                                                <input type="radio" name="status" value="active" checked={vehicleFormData.status !== 'maintenance'} onChange={e => setVehicleFormData({...vehicleFormData, status: 'active'})} className="hidden"/>
                                                <CheckCircle size={18}/> 正常營運
                                            </label>
                                            <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all ${vehicleFormData.status === 'maintenance' ? 'bg-rose-50 border-rose-500 text-rose-700 shadow-sm font-bold' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-500 font-medium'}`}>
                                                <input type="radio" name="status" value="maintenance" checked={vehicleFormData.status === 'maintenance'} onChange={e => setVehicleFormData({...vehicleFormData, status: 'maintenance'})} className="hidden"/>
                                                <AlertTriangle size={18}/> 維修保養
                                            </label>
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider block mb-2 flex items-center gap-1.5"><CreditCard size={14} className="text-blue-500"/> ETC 綁定</label>
                                        <select className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm text-slate-700 mb-3 cursor-pointer transition-all focus:bg-white font-bold" value={vehicleFormData.etc} onChange={e=>setVehicleFormData({...vehicleFormData, etc:e.target.value})}>
                                            <option value="">-- 不綁定 ETC --</option>
                                            {Array.from(new Set(vehicles.map(v=>v.etc).filter(Boolean))).concat(newEtcNumber ? [newEtcNumber] : []).map(etc => {
                                                const owner = vehicles.find(v => v.etc === etc);
                                                const isUsed = owner && owner.id !== editingVehicle?.id;
                                                return <option key={etc} value={etc}>{etc} {isUsed ? `(目前由 ${owner.plate} 使用)` : ''}</option>
                                            })}
                                        </select>

                                        <div className="flex gap-2 items-center pt-3 border-t border-slate-100">
                                            <input placeholder="輸入新 ETC 卡號" className="flex-1 bg-slate-50 border border-slate-200 p-2.5 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 outline-none transition-all focus:bg-white" value={newEtcNumber} onChange={e=>setNewEtcNumber(e.target.value)}/>
                                            <button type="button" onClick={()=>{ if(newEtcNumber) { setVehicleFormData({...vehicleFormData, etc:newEtcNumber}); setNewEtcNumber(''); } }} className="px-4 py-2.5 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-slate-700 transition-colors shadow-sm active:scale-95 whitespace-nowrap">新增登錄</button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 pt-4 mt-4 sticky bottom-0 bg-slate-50/90 backdrop-blur-md pb-2">
                                        <button type="button" onClick={()=>setIsVehicleModalOpen(false)} className="flex-1 py-3.5 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition-colors shadow-sm">取消</button>
                                        <button type="submit" className="flex-1 py-3.5 bg-slate-900 text-white rounded-xl font-bold text-base tracking-wide hover:bg-slate-800 transition-all active:scale-[0.98] shadow-md shadow-slate-900/20">儲存檔案</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<VehicleOrderSystem />);
    </script>
</body>
</html>
